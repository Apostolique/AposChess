<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AposChess">
  <rect width="64" height="64" rx="12" fill="#2e2b29"/>

  <!-- landing square the rook jumps to -->
  <rect x="7" y="37" width="13" height="13" rx="2" fill="none" stroke="#e8a33d" stroke-width="2.5"/>

  <!-- the piece being jumped over -->
  <g fill="#9b9692">
    <circle cx="29" cy="41" r="4"/>
    <path d="M23 52c0-7 12-7 12 0z"/>
    <rect x="22" y="51" width="14" height="3" rx="1"/>
  </g>

  <!-- jump arc, leaping over the piece -->
  <path d="M50 20 C46 2 23 0 14 37" fill="none" stroke="#e8a33d"
        stroke-width="3" stroke-linecap="round" stroke-dasharray="0.1 6"/>

  <!-- rook -->
  <g fill="#f4f1ea">
    <path d="M39 20h20v7h-20z"/>
    <rect x="43" y="20" width="4" height="4" fill="#2e2b29"/>
    <rect x="51" y="20" width="4" height="4" fill="#2e2b29"/>
    <path d="M41 27h16l-3 17h-10z"/>
    <rect x="37" y="47" width="24" height="6" rx="2"/>
    <rect x="40" y="43" width="18" height="4"/>
  </g>
</svg>
