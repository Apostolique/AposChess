name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The job pushes the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # TURN server for online play across networks. Set these as repository
          # secrets (Settings → Secrets and variables → Actions → Secrets); without
          # them the deployed site has STUN only (same-network play works,
          # cross-network needs the relay). Vite exposes VITE_*-prefixed env vars.
          # NOTE: these end up in the public client bundle regardless — secrets just
          # keep them out of CI logs/UI; rotate in Metered if the quota is abused.
          VITE_TURN_URLS: ${{ secrets.VITE_TURN_URLS }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          # dist already contains .nojekyll; keep it.
          enable_jekyll: false
